---
_extends: .github:common-settings.yaml

repository:
  name: .github
  description: Template repository for a .github repository
  topics: template, github, repository, settings
  is_template: true

branches:
  - name: main
    protection:
      required_status_checks:
        strict: true
        checks:
          - context: Advanced Security Analysis
          - context: CodeQL
          - context: Container Scan
          - context: Create Renovate Changeset
          - context: Fro Bot
          - context: GitGuardian Scan
          - context: License Scan
          - context: Quality Check
          - context: Release
          - context: Renovate
          - context: Review Dependencies
          - context: Triage

      enforce_admins: true
      required_pull_request_reviews:
        dismiss_stale_reviews: true
        require_code_owner_reviews: false
        required_approving_review_count: 0
      restrictions: null
      required_linear_history: true
