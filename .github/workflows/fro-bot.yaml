# Fro Bot AI agent — responds to mentions, reviews PRs, and runs scheduled maintenance.
---
name: Fro Bot

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  discussion_comment:
    types: [created]
  issues:
    types: [opened, edited]
  pull_request:
    types: [synchronize, ready_for_review, reopened, review_requested]
  schedule:
    - cron: '30 15 * * *'
  workflow_dispatch:
    inputs:
      prompt:
        description: Custom prompt for the Fro Bot agent
        required: true
  workflow_call:
    inputs:
      prompt:
        description: Prompt passed by reusable caller workflow
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: >-
    fro-bot-${{
      github.event.issue.number ||
      github.event.pull_request.number ||
      github.event.discussion.number ||
      github.run_id
    }}
  cancel-in-progress: false

env:
  PR_REVIEW_PROMPT: |
    You are a security-focused reviewer for bfra-me/.github — the org control
    center that defines workflows, actions, repo settings, and shared configs
    for the @bfra-me GitHub organization. Read AGENTS.md first.

    Scope:
    - Workflow/CI changes: all actions MUST be pinned to full commit SHA with
      a version comment (e.g. `@<sha> # v1.2.3`). Flag any floating tag
      (`@main`, `@v1`). Check for workflow injection (untrusted input in
      `run:` blocks). Verify minimal permissions. Ensure no secrets leak.
    - Action source changes (`.github/actions/*/src/`): verify `dist/` was
      rebuilt and committed. If dist/ changes are missing, flag as blocking.
    - Changesets: verify `.changeset/*.md` files are manually authored
      (not CLI-generated). Check that the bump type matches the change scope.
    - TypeScript: no `any`, no `@ts-ignore`/`@ts-expect-error`. Explicit
      null checks (`!= null`) instead of implicit truthiness. ESM only
      (import/export, no require()).
    - Workflow templates (`workflow-templates/`): must have matching
      `.properties.json` metadata. Placeholder variables must use standard
      names ($default-branch, $protected-branches, $cron-weekly).
    - Dependencies: flag new deps; verify license compatibility. This repo
      uses @bfra.me shared configs — prefer those over ad-hoc alternatives.

    Hard boundaries:
    - Review only. Do NOT push commits, modify files, create branches, or
      open PRs.
    - Do NOT use labels, assignments, or milestone changes.
    - Use inline comments for file-specific findings. Use review body for
      summary only.

    Do NOT comment on formatting, lint, or style nits handled by CI.

    Output:
    ## Verdict: PASS / CONDITIONAL / REJECT
    ### Blocking issues
    ### Non-blocking concerns
    ### Missing tests
    ### Risk assessment (LOW/MED/HIGH) + rationale

    Requirements:
    - Include every heading exactly once and in the order above.
    - Write "None" under headings with no findings.
    - Keep findings actionable: file path, impact, and concrete remediation.

  SCHEDULE_PROMPT: |
    Create a single issue titled "Daily Org Oversight Report — YYYY-MM-DD (UTC)"
    in this repository (bfra-me/.github).

    Scope: all repositories in the bfra-me GitHub organization.
    Use `gh` CLI to query repos, issues, PRs, check runs, and security alerts
    across the org. Work through every public, non-archived repo.

    Search for an issue with this exact title pattern. If multiple matches
    exist, use the most recently updated one. If no open issue exists, create
    it. If the most recent matching issue is closed, reopen it instead of
    creating a new one.

    Append a new dated section for each run using "## YYYY-MM-DD (UTC)".
    To keep the issue bounded: after appending today's section, replace any
    individual daily sections older than 14 days with a single
    "## Historical Summary" section that lists only the count of prior runs
    and any items that remained unresolved across those runs. If a Historical
    Summary already exists, update it in place.

    Include links only (no full content duplication). Keep it concise and
    actionable. Flag items that appear for the first time (not present in
    the previous dated section) with a ★ marker.

    Sections (in order):
    - Summary metrics (total repos scanned, new issues since last run,
      currently open PRs across org, stale issues/PRs count, repos with
      failing main branch checks, security alerts if accessible)
    - Critical items (security alerts, main branch failing, broken release
      pipelines) with repo name, link, and recommended action
    - Aging PRs (no activity >7 days; stale >14 days) — group by repo
    - Stale issues (no activity >30 days; recommend next step) — group by repo
    - Unassigned bugs or high-signal issues (label bug, no assignee)
    - Repo hotspots (top 3 repos by open PRs, stale items, or failing checks)
    - Recommended actions (bulleted checklist, prioritized by impact)
    - Notes (use "data unavailable" for any inaccessible data source)

    Do NOT comment on or modify individual issues/PRs. Do NOT apply labels.
    Do NOT open PRs. This run must produce ONE summary issue only.

jobs:
  fro-bot:
    name: Fro Bot
    runs-on: ubuntu-latest
    if: >-
      (
        github.event.pull_request == null ||
        (
          !github.event.pull_request.head.repo.fork &&
          !endsWith(github.event.pull_request.user.login || '', '[bot]')
        )
      ) && (
        (
          github.event_name == 'issues' &&
          !endsWith(github.event.issue.user.login || '', '[bot]') &&
          (github.event.issue.user.login || '') != 'fro-bot'
        ) ||
        (
          github.event_name == 'pull_request' &&
          !endsWith(github.event.pull_request.user.login || '', '[bot]') &&
          (github.event.pull_request.user.login || '') != 'fro-bot'
        ) ||
        github.event_name == 'schedule' ||
        github.event_name == 'workflow_dispatch' ||
        inputs.prompt != '' ||
        (
          (github.event_name == 'issue_comment' ||
           github.event_name == 'pull_request_review_comment' ||
           github.event_name == 'discussion_comment') &&
          contains(github.event.comment.body || '', '@fro-bot') &&
          (github.event.comment.user.login || '') != 'fro-bot' &&
          contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association || '')
        )
      )
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.FRO_BOT_PAT }}

      - name: Setup PNPM
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: pnpm
          node-version-file: .node-version

      - name: Install dependencies
        env:
          HUSKY: '0'
        run: pnpm bootstrap

      - name: Build actions
        run: pnpm build

      - name: Run Fro Bot
        uses: fro-bot/agent@8e60ed0350cfd455c23282937a1f0b8865803342 # v0.30.5
        env:
          OPENCODE_PROMPT_ARTIFACT: 'true'
          PROMPT: >-
            ${{
              (github.event_name == 'workflow_dispatch' && (github.event.inputs.prompt || ''))
              || inputs.prompt
              || (github.event_name == 'schedule' && env.SCHEDULE_PROMPT)
              || (github.event_name == 'pull_request' && env.PR_REVIEW_PROMPT)
              || ''
            }}
        with:
          github-token: ${{ secrets.FRO_BOT_PAT }}
          auth-json: ${{ secrets.OPENCODE_AUTH_JSON }}
          model: ${{ vars.FRO_BOT_MODEL }}
          omo-providers: ${{ secrets.OMO_PROVIDERS }}
          prompt: ${{ env.PROMPT }}
