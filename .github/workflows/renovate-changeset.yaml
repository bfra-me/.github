---
name: Create Renovate Changeset

on:
  merge_group:
  pull_request_target:
  workflow_call:
    inputs:
      target-package:
        description: >-
          Optional override for the changeset release target used for
          fallback updates (e.g. `github-actions` manager updates that don't
          touch any workspace member). By default the action auto-selects a
          non-private workspace package, preferring the workspace root when
          it is publishable. Set this when you want a specific package to
          absorb fallback bumps in a multi-package monorepo.
        required: false
        type: string
    secrets:
      APPLICATION_ID:
        description: GitHub App ID for generating tokens
        required: true
      APPLICATION_PRIVATE_KEY:
        description: GitHub App private key for generating tokens
        required: true

permissions:
  contents: read

jobs:
  create-changeset:
    name: Create Renovate Changeset
    runs-on: ubuntu-latest
    if: >-
      endsWith(github.actor, '[bot]') &&
      !startsWith(github.head_ref, 'chore/update-action-pins-')
    steps:
      - id: get-workflow-access-token
        name: Get Workflow Access Token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.APPLICATION_ID }}
          private-key: ${{ secrets.APPLICATION_PRIVATE_KEY }}

      - name: Setup Git user
        run: |
          git config --global user.email '118100583+bfra-me[bot]@users.noreply.github.com'
          git config --global user.name 'bfra-me[bot]'

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2
          ref: ${{ github.head_ref }}
          token: ${{ steps.get-workflow-access-token.outputs.token }}

      - id: workflow-ref
        name: Resolve workflow ref
        run: echo "ref=${GITHUB_WORKFLOW_REF##*@}" >> "$GITHUB_OUTPUT"

      - name: Checkout action
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: bfra-me/.github
          ref: ${{ steps.workflow-ref.outputs.ref }}
          token: ${{ steps.get-workflow-access-token.outputs.token }}
          path: .bfra-me-github
          sparse-checkout: .github/actions/renovate-changesets

      - id: renovate-changesets
        name: 🖌️ Generate Renovate changesets
        uses: ./.bfra-me-github/.github/actions/renovate-changesets
        with:
          token: ${{ steps.get-workflow-access-token.outputs.token }}
          commit-back: 'true'
          max-retries: '3'
          target-package: ${{ inputs.target-package }}
