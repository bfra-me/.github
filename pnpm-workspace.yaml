autoInstallPeers: true

ignoreWorkspaceRootCheck: true

allowBuilds:
  esbuild: true
  unrs-resolver: true

overrides:
  esbuild@>=0.17.0 <0.28.1: '>=0.28.1'
  flatted: 3.4.2
  undici@<6.27.0: '>=6.27.0'
  vite@>=8.0.0 <=8.0.4: '>=8.0.5'

packages:
  - .
  - .github/actions/*

savePrefix: ''

shamefullyHoist: true

shellEmulator: true

strictPeerDependencies: false
