    if: github.actor == 'renovate[bot]' || github.actor == 'bfra-me[bot]'
    name: Renovate Changesets
    secrets: inherit
    uses: bfra-me/.github/.github/workflows/renovate-changeset.yaml@7cdb7496c5b9c7c7fdf706e3cc0bf8163ca61927 # v4.13.9
