name: Renovate Changesets

on:
  merge_group:
  pull_request_target:

permissions:
  contents: read

jobs:
  renovate-changesets:
    if: github.actor == 'renovate[bot]' || github.actor == 'bfra-me[bot]'
    name: Renovate Changesets
    secrets: inherit
    uses: bfra-me/.github/.github/workflows/renovate-changeset.yaml@0f61575a5698631e073691ee6fd7c799587f673f # v4.16.39
